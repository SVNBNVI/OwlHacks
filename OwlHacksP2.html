<!doctype html>
<html lang="en">
<head>
<link rel="stylesheet" type="OwlHacksDesign.css" href="OwlHacksDesign.css">
<!DOCTYPE html>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Broad Street Line — Philadelphia</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
      background: #f5f5f5;
    }
    h1 {
      margin-bottom: 16px;
    }
    .map-container {
      display: inline-block;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }
    .map-container img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }
    .caption {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Broad Street Line — Philadelphia</h1>

  <div class="map-container">
    <!-- Static map centered around City Hall (middle of Broad Street) -->
    <img 
      src="https://staticmap.openstreetmap.de/staticmap.php?center=39.9526,-75.1638&zoom=14&size=800x500&maptype=mapnik&markers=39.9526,-75.1638,blue"
      alt="Static map centered on Broad Street Line, Philadelphia"
    />
    <div class="caption">
      Map centered at <strong>Broad Street / City Hall area</strong> — approximate middle of the Broad Street Line.
    </div>
  </div>
</body>
</html>
